<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="承希智汇 Chency Intelligence Hub - 企业内部系统、工具、网址与智能问答入口。" />
    <meta name="theme-color" content="#0f1f3a" />
    <meta name="application-name" content="承希智汇" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="承希智汇" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>承希智汇 | Chency Intelligence Hub</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icons/icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">CIH</div>
          <div>
            <div class="brand-name">承希智汇</div>
            <div class="brand-subtitle">Chency Intelligence Hub</div>
          </div>
        </div>
        <div class="daily-photo-display">
          <img src="/api/photos/today/portrait/preview" alt="今日照片" loading="lazy" />
        </div>
        <nav class="section-nav" id="sectionNav"></nav>
        <div class="sidebar-footer">
          <span class="status-dot"></span>
          <span>内部工作台</span>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Enterprise Navigation</p>
            <h1>承希智汇</h1>
          </div>
          <form class="search-bar" action="https://www.bing.com/search" method="GET" target="_blank">
            <input name="q" id="globalSearch" type="search" placeholder="在 Bing 中搜索..." autocomplete="off" />
            <button type="submit" aria-label="搜索">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
          </form>
        </header>

        <section class="catalog-area" id="catalogArea" aria-live="polite"></section>
      </main>
    </div>

    <section class="assistant-widget" aria-label="智能问答">
      <button class="assistant-fab" id="assistantToggle" type="button" aria-expanded="false" aria-controls="assistantPanel" aria-label="打开犇犇问答">
        <span class="assistant-fab-mark" aria-hidden="true">犇犇问答</span>
      </button>
      <aside class="assistant-panel" id="assistantPanel" aria-hidden="true">
        <div class="assistant-header">
          <img class="assistant-avatar" src="assets/benben.png" alt="犇犇" aria-hidden="true">
          <div>
            <h2 id="assistantTitle">承希智汇问答</h2>
            <p id="assistantSubtitle">承希制度解读助手</p>
          </div>
          <button class="assistant-close" id="assistantClose" type="button" aria-label="关闭问答">×</button>
        </div>
        <div class="assistant-frame" id="assistantFrame">
          <div class="assistant-placeholder">
            <strong>FastGPT 接入预留</strong>
            <span>在本地 config.local.js 中配置 fastgptChatUrl 后，这里会嵌入实时问答。</span>
          </div>
        </div>
      </aside>
    </section>
  </body>
</html>
