<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Intelligence Hub - 企业内部系统、工具、网址与智能问答入口。" />
    <meta name="theme-color" content="#0f1f3a" />
    <meta name="application-name" content="Intelligence Hub" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Intelligence Hub" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Intelligence Hub</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css?v=20260722_02" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/marked@12.0.0/marked.min.js"></script>
    <script src="https://unpkg.com/dompurify@3.0.9/dist/purify.min.js"></script>
    <script type="module" src="./app.js?v=20260722_02"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand-block">
          <span class="brand-mark" aria-hidden="true">
            <img src="./assets/icons/icon-192.png" alt="" />
          </span>
          <div>
            <div class="brand-name">Intelligence Hub</div>
            <div class="brand-subtitle">Intelligence Hub</div>
          </div>
        </div>
        <nav class="section-nav" id="sectionNav"></nav>
        <div class="daily-photo-display">
          <img src="" alt="今日照片" loading="lazy" />
        </div>
        <button class="sidebar-footer" id="adminEntry" type="button" aria-label="进入后台">
          <span class="status-dot"></span>
          <span>内部工作台</span>
        </button>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Enterprise Navigation</p>
            <h1>Intelligence Hub</h1>
          </div>
        </header>

        <section class="assistant-home" id="assistantHome" aria-label="犇犇助手对话区">
          <div class="assistant-home-heading">
            <div>
              <p class="assistant-home-kicker">犇犇助手</p>
              <h2>今天想让犇犇帮你做什么？</h2>
            </div>
            <p>查询会议、报销记录，或咨询公司制度。</p>
          </div>
          <div class="assistant-inline-mount" id="assistantInlineMount"></div>
          <div class="assistant-quick-prompts" aria-label="常用提问">
            <button type="button" data-assistant-prompt="查询我接下来一个星期的会议">查询我的会议</button>
            <button type="button" data-assistant-prompt="我想预定会议室">预定会议室</button>
            <button type="button" data-assistant-prompt="查询我最近一年的报销记录">查询报销记录</button>
          </div>
        </section>

        <section class="catalog-area" id="catalogArea" aria-live="polite"></section>
      </main>
    </div>

    <section class="assistant-widget" aria-label="智能问答">
      <button class="assistant-fab" id="assistantToggle" type="button" aria-expanded="false" aria-controls="assistantPanel" aria-label="打开 AI 助手">
        <span class="assistant-fab-mark" aria-hidden="true">AI 助手</span>
      </button>
      <aside class="assistant-panel" id="assistantPanel" aria-hidden="true">
        <input type="file" id="nativeInvoiceUpload" accept="image/*,application/pdf" multiple style="display:none" />

        <button class="assistant-resize-handle" id="assistantResizeHandle" type="button" aria-label="拖动调整助手窗口大小；也可使用方向键" title="拖动或使用方向键调整窗口大小">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path>
          </svg>
        </button>
        
        <button class="assistant-close floating-close" id="assistantClose" type="button" aria-label="关闭问答">×</button>
        <div class="assistant-history-toolbar" aria-label="对话记录">
          <button class="assistant-history-state" id="assistantHistoryToggle" type="button" aria-expanded="false" aria-controls="assistantHistoryDrawer">
            <i data-lucide="history"></i><span id="assistantSessionLabel">今天 · 自动保存</span><i class="assistant-history-chevron" data-lucide="chevron-down"></i>
          </button>
          <button class="assistant-new-chat" id="assistantNewChat" type="button" aria-label="新建对话" title="新建对话">
            <i data-lucide="square-pen"></i><span>新对话</span>
          </button>
          <button class="assistant-clear" id="assistantClear" type="button" aria-label="删除当前对话" title="删除当前对话">
            <i data-lucide="trash-2"></i><span>删除</span>
          </button>
        </div>
        <div class="assistant-history-layer" id="assistantHistoryLayer" aria-hidden="true">
          <button class="assistant-history-backdrop" id="assistantHistoryBackdrop" type="button" aria-label="关闭对话记录"></button>
          <section class="assistant-history-drawer" id="assistantHistoryDrawer" aria-label="已保存的对话">
            <header class="assistant-history-header">
              <div>
                <p>本机保存</p>
                <h3>对话记录</h3>
              </div>
              <button id="assistantHistoryClose" type="button" aria-label="关闭对话记录">×</button>
            </header>
            <div class="assistant-session-list" id="assistantSessionList"></div>
            <footer class="assistant-history-footer">
              <button id="assistantClearAll" type="button"><i data-lucide="trash-2"></i>清除全部记录</button>
              <p>记录仅保存在当前浏览器</p>
            </footer>
          </section>
        </div>
        <div class="assistant-chat-container">
          <div class="assistant-messages" id="assistantMessages">
            <div class="assistant-message assistant-message-system">
              <div class="assistant-message-content">
                你好！我是 AI 助手，有什么我可以帮您的吗？
              </div>
            </div>
          </div>
          <div class="assistant-input-area">
            <!-- Attachment preview pool -->
            <div class="assistant-attachment-pool" id="assistantAttachmentPool" style="display:none;"></div>
            
            <div class="assistant-input-wrapper">
              <button class="native-upload-btn" id="nativeUploadBtn" type="button" aria-label="通讯费报销">
                通讯费报销
              </button>
              <textarea id="assistantInput" placeholder="查询会议、报销记录，或问问公司制度..." rows="1"></textarea>
              <input id="difyAttachmentInput" type="file" accept="image/*,application/pdf" multiple style="display:none;" />
              <button id="difyAttachmentBtn" class="assistant-mic-btn" type="button" aria-label="上传发票附件">
                <i data-lucide="paperclip"></i>
              </button>
              <button id="assistantMicBtn" class="assistant-mic-btn" type="button" aria-label="语音输入">
                <i data-lucide="mic"></i>
              </button>
              <button id="assistantSendBtn" type="button" aria-label="发送">
                <svg class="assistant-send-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M22 2 11 13"></path>
                  <path d="m22 2-7 20-4-9-9-4Z"></path>
                </svg>
              </button>
            </div>
            <div class="assistant-footer">POWERED BY Intelligence Hub</div>
          </div>
        </div>
      </aside>
    </section>
    <section class="photo-viewer" id="photoViewer" aria-hidden="true">
      <div class="photo-viewer-overlay" id="photoViewerOverlay"></div>
      <div class="photo-viewer-content">
        <img src="" alt="今日照片全屏" id="photoViewerImg" />
        <button class="photo-viewer-close" id="photoViewerClose" type="button" aria-label="关闭预览">×</button>
      </div>
    </section>

    <!-- Invoice Result Modal -->
    <div class="invoice-modal-overlay" id="invoiceResultModal" aria-hidden="true">
      <div class="invoice-modal-content">
        <div class="invoice-modal-header">
          <h3 id="invoiceModalTitle">发票识别结果</h3>
          <button class="invoice-modal-close" id="invoiceModalClose">&times;</button>
        </div>
        <div class="invoice-modal-body" id="invoiceModalBody">
          <!-- Dynamically filled -->
        </div>
        <div class="invoice-modal-footer" id="invoiceModalFooter">
          <!-- Dynamically filled -->
        </div>
      </div>
    </div>
  </body>
</html>
