version: '3.8'
services:
  intelligence-hub:
    build: .
    container_name: intelligence-hub
    ports:
      - "8080:80"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./app.js:/app/app.js
      - ./styles.css:/app/styles.css
      - ./index.html:/app/index.html
      - ./admin.html:/app/admin.html
      - ./admin.js:/app/admin.js
      - ./server.js:/app/server.js
      - ./sw.js:/app/sw.js
    restart: always
